<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Telemetry - Actionable Insights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #333;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .tool-card {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-card:hover {
            border-color: #667eea;
            background: #2a2a2a;
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .tool-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .tool-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .tool-metric {
            font-size: 0.9rem;
            color: #888;
        }

        .tool-metric strong {
            color: #4ade80;
        }

        .tool-details {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .tool-details.expanded {
            display: block;
        }

        .call-item {
            background: #1a1a1a;
            border-left: 3px solid #667eea;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .call-time {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }

        .call-params {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #4ade80;
            margin-top: 8px;
            overflow-x: auto;
        }

        .call-cost {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .insight-box {
            background: #2a1a4a;
            border: 1px solid #667eea;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .insight-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .insight-text {
            color: #d0d0d0;
            line-height: 1.6;
        }

        .expand-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .expand-btn:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .top-calls {
            margin-top: 20px;
        }

        .top-call-item {
            background: #1a1a1a;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #f093fb;
        }

        .pattern-tag {
            display: inline-block;
            background: #3a3a3a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 8px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AOS Telemetry - Actionable Insights</h1>
            <p class="subtitle">Context Window Provenance & Cost Attribution</p>
        </header>

        <div class="card">
            <h2 class="card-title">📊 Session Overview</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Cost</div>
                    <div class="stat-value" id="total-cost">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Calls</div>
                    <div class="stat-value" id="total-calls">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Tokens</div>
                    <div class="stat-value" id="total-tokens">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Avg Cost/Call</div>
                    <div class="stat-value" id="avg-cost">$0.00</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">💡 Key Insights</h2>
            <div id="insights">
                <div class="loading">Analyzing patterns...</div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">🔍 Tool Breakdown (Click to Expand)</h2>
            <div id="tool-breakdown">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">💰 Most Expensive Calls</h2>
            <div id="top-expensive">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Use relative URLs so it works both locally and remotely
        const API_BASE = window.location.origin;

        async function analyzeInsights(timeline, tools) {
            // Use server-side insights API for centralized logic
            try {
                const response = await fetch(`${API_BASE}/api/insights`);
                const data = await response.json();
                return data.insights || [];
            } catch (error) {
                console.warn('Failed to fetch insights from API, using fallback:', error);
                // Fallback to local analysis if API fails
                return analyzeInsightsLocal(timeline, tools);
            }
        }

        function analyzeInsightsLocal(timeline, tools) {
            const insights = [];
            
            // Find most expensive single call
            const sorted = [...timeline].sort((a, b) => (b.cost || 0) - (a.cost || 0));
            if (sorted.length > 0 && (sorted[0].cost || 0) > 0.05) {
                const top = sorted[0];
                insights.push({
                    title: '💸 Highest Cost Single Call',
                    text: `${top.tool} cost $${(top.cost || 0).toFixed(4)} (${(top.tokens?.total || 0).toLocaleString()} tokens). ${
                        top.tool === 'read' ? `Reading large file: ${JSON.stringify(top.params).substring(0, 100)}...` :
                        top.tool === 'exec' ? `Command: ${top.params?.command?.substring(0, 100)}...` :
                        'See details below.'
                    }`
                });
            }

            // Check for repeated patterns
            const toolCounts = {};
            timeline.forEach(t => {
                const key = `${t.tool}:${JSON.stringify(t.params).substring(0, 50)}`;
                toolCounts[key] = (toolCounts[key] || 0) + 1;
            });
            const repeated = Object.entries(toolCounts).find(([k, v]) => v > 3);
            if (repeated) {
                insights.push({
                    title: '🔁 Repeated Pattern Detected',
                    text: `Same operation repeated ${repeated[1]} times. Consider caching or batching.`
                });
            }

            // High token operations
            const highToken = timeline.filter(t => (t.tokens?.total || 0) > 20000);
            if (highToken.length > 0) {
                insights.push({
                    title: '📈 High Token Usage',
                    text: `${highToken.length} calls used >20K tokens. These likely loaded large context files. Check if all context is necessary.`
                });
            }

            return insights;
        }

        async function loadData() {
            try {
                console.log('API_BASE:', API_BASE);
                console.log('Fetching data...');
                
                // Load all data
                const [summary, tools, timeline] = await Promise.all([
                    fetch(`${API_BASE}/api/summary`).then(r => {
                        console.log('Summary response:', r.status);
                        return r.json();
                    }),
                    fetch(`${API_BASE}/api/tools`).then(r => {
                        console.log('Tools response:', r.status);
                        return r.json();
                    }),
                    fetch(`${API_BASE}/api/timeline`).then(r => {
                        console.log('Timeline response:', r.status);
                        return r.json();
                    })
                ]);
                
                console.log('Data loaded successfully');

                // Update overview
                console.log('Updating overview with summary:', summary);
                // Handle both old format and new nested format
                const stats = summary.overview || summary;
                document.getElementById('total-cost').textContent = `$${(stats.totalCost || 0).toFixed(2)}`;
                document.getElementById('total-calls').textContent = (stats.totalCalls || 0).toLocaleString();
                document.getElementById('total-tokens').textContent = 'N/A'; // Not in new API format
                document.getElementById('avg-cost').textContent = `$${(stats.avgCostPerCall || 0).toFixed(4)}`;

                // Generate insights
                console.log('Generating insights...');
                try {
                    const insights = await analyzeInsights(timeline, tools);
                    const insightsEl = document.getElementById('insights');
                    if (insights.length === 0) {
                        insightsEl.innerHTML = '<p style="color: #888;">Not enough data for insights yet. Run more operations!</p>';
                    } else {
                        // Handle both old format (title/text) and new API format (type/severity/message/recommendation/impact)
                        insightsEl.innerHTML = insights.map(i => {
                            if (i.title && i.text) {
                                // Old format (fallback)
                                return `
                                    <div class="insight-box">
                                        <div class="insight-title">${i.title}</div>
                                        <div class="insight-text">${i.text}</div>
                                    </div>
                                `;
                            } else {
                                // New API format
                                const severityColor = {
                                    high: '#ff6b6b',
                                    medium: '#ffa500',
                                    low: '#ffd93d',
                                    good: '#51cf66'
                                }[i.severity] || '#888';
                                const severityEmoji = {
                                    high: '🚨',
                                    medium: '⚠️',
                                    low: '💡',
                                    good: '✅'
                                }[i.severity] || '📊';
                                
                                return `
                                    <div class="insight-box" style="border-left: 4px solid ${severityColor};">
                                        <div class="insight-title">${severityEmoji} ${i.tool || i.type}</div>
                                        <div class="insight-text"><strong>${i.message}</strong></div>
                                        ${i.recommendation ? `<div class="insight-text" style="color: #888; margin-top: 8px;">💡 ${i.recommendation}</div>` : ''}
                                        ${i.impact ? `<div class="insight-text" style="color: #51cf66; margin-top: 8px;">📈 ${i.impact}</div>` : ''}
                                    </div>
                                `;
                            }
                        }).join('');
                    }
                    console.log('Insights generated:', insights.length);
                } catch (error) {
                    console.error('Error generating insights:', error);
                    document.getElementById('insights').innerHTML = '<p style="color: #ff6b6b;">Error generating insights</p>';
                }

                // Tool breakdown with expandable details
                console.log('Building tool breakdown...');
                const toolBreakdown = document.getElementById('tool-breakdown');
                const toolsWithCalls = tools.map(tool => {
                    const calls = timeline.filter(t => t.tool === tool.tool);
                    return { ...tool, calls };
                });
                console.log('Tools with calls:', toolsWithCalls.length);

                try {
                    toolBreakdown.innerHTML = toolsWithCalls
                        .sort((a, b) => (b.totalCost || 0) - (a.totalCost || 0))
                        .map((tool, idx) => `
                        <div class="tool-card" onclick="toggleTool(${idx})">
                            <div class="tool-header">
                                <div class="tool-name">${tool.tool}</div>
                                <button class="expand-btn" id="expand-btn-${idx}">Show Details</button>
                            </div>
                            <div class="tool-summary">
                                <div class="tool-metric"><strong>${tool.count || 0}</strong> calls</div>
                                <div class="tool-metric"><strong>$${(tool.totalCost || 0).toFixed(4)}</strong> total cost</div>
                                <div class="tool-metric"><strong>${(tool.totalTokens || 0).toLocaleString()}</strong> tokens</div>
                                <div class="tool-metric"><strong>$${(tool.avgCost || 0).toFixed(4)}</strong> avg/call</div>
                            </div>
                            <div class="tool-details" id="tool-details-${idx}">
                                <h3 style="color: #888; margin-bottom: 12px;">Individual Calls:</h3>
                                ${tool.calls.map(call => `
                                    <div class="call-item">
                                        <div class="call-time">${new Date(call.timestamp).toLocaleString()}</div>
                                        <div><strong>Tool:</strong> ${call.tool}</div>
                                        <div class="call-params">${JSON.stringify(call.params, null, 2)}</div>
                                        <div style="margin-top: 8px;">
                                            <span class="call-cost">$${(call.cost || 0).toFixed(4)}</span>
                                            <span style="color: #888; margin-left: 12px;">${call.tokens?.total || 0} tokens</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                    console.log('Tool breakdown rendered');
                } catch (error) {
                    console.error('Error rendering tool breakdown:', error);
                    toolBreakdown.innerHTML = '<p style="color: #ff6b6b;">Error rendering tools</p>';
                }

                // Most expensive calls
                console.log('Rendering top expensive calls...');
                try {
                    const topExpensive = document.getElementById('top-expensive');
                    const sorted = [...timeline].sort((a, b) => (b.cost || 0) - (a.cost || 0)).slice(0, 5);
                    topExpensive.innerHTML = sorted.map(call => `
                    <div class="top-call-item">
                        <div style="margin-bottom: 8px;">
                            <strong>${call.tool}</strong>
                            <span class="call-cost" style="margin-left: 12px;">$${(call.cost || 0).toFixed(4)}</span>
                            <span style="color: #888; margin-left: 12px;">${call.tokens?.total.toLocaleString()} tokens</span>
                        </div>
                        <div class="call-time">${new Date(call.timestamp).toLocaleString()}</div>
                        <div class="call-params">${JSON.stringify(call.params, null, 2)}</div>
                    </div>
                `).join('');
                    console.log('Top expensive calls rendered');
                } catch (error) {
                    console.error('Error rendering expensive calls:', error);
                    document.getElementById('top-expensive').innerHTML = '<p style="color: #ff6b6b;">Error rendering expensive calls</p>';
                }

            } catch (error) {
                console.error('Error loading data:', error);
                console.error('Error stack:', error.stack);
                
                // Show error in the page instead of alert
                document.getElementById('insights').innerHTML = `
                    <div style="background: #ff6b6b; color: white; padding: 16px; border-radius: 8px;">
                        <strong>Error:</strong> ${error.message}<br>
                        <small>Check browser console (F12) for details</small>
                    </div>
                `;
            }
        }

        function toggleTool(idx) {
            const details = document.getElementById(`tool-details-${idx}`);
            const btn = document.getElementById(`expand-btn-${idx}`);
            if (details.classList.contains('expanded')) {
                details.classList.remove('expanded');
                btn.textContent = 'Show Details';
            } else {
                details.classList.add('expanded');
                btn.textContent = 'Hide Details';
            }
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
