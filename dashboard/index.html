<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Telemetry - Live Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #333;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .tool-list {
            list-style: none;
        }

        .tool-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #252525;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .tool-name {
            font-weight: 600;
            color: #fff;
        }

        .tool-stats {
            font-size: 0.9rem;
            color: #888;
        }

        .timeline-item {
            padding: 12px;
            background: #252525;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .timeline-time {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }

        .timeline-tool {
            font-weight: 600;
            color: #fff;
        }

        .timeline-cost {
            font-size: 0.85rem;
            color: #4ade80;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AOS Telemetry Dashboard<span class="live-indicator"></span></h1>
            <p class="subtitle">Real-time Agent Observability System</p>
        </header>

        <div class="card">
            <h2 class="card-title">Overview</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Calls</div>
                    <div class="stat-value" id="total-calls">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Cost</div>
                    <div class="stat-value" id="total-cost">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Tokens</div>
                    <div class="stat-value" id="total-tokens">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Unique Tools</div>
                    <div class="stat-value" id="unique-tools">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Tool Usage</h2>
            <ul class="tool-list" id="tool-list">
                <li class="loading">Loading...</li>
            </ul>
        </div>

        <div class="card">
            <h2 class="card-title">Recent Activity</h2>
            <div id="timeline">
                <div class="loading">Loading...</div>
            </div>
            <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3003';

        async function loadData() {
            try {
                // Load summary
                const summary = await fetch(`${API_BASE}/api/summary`).then(r => r.json());
                document.getElementById('total-calls').textContent = summary.totalCalls;
                document.getElementById('total-cost').textContent = `$${summary.totalCost.toFixed(4)}`;
                document.getElementById('total-tokens').textContent = summary.totalTokens.toLocaleString();
                document.getElementById('unique-tools').textContent = summary.uniqueTools;

                // Load tool usage
                const tools = await fetch(`${API_BASE}/api/tools`).then(r => r.json());
                const toolList = document.getElementById('tool-list');
                toolList.innerHTML = tools
                    .sort((a, b) => b.count - a.count)
                    .map(tool => `
                        <li class="tool-item">
                            <span class="tool-name">${tool.tool}</span>
                            <span class="tool-stats">
                                ${tool.count} calls · $${tool.totalCost.toFixed(4)} · ${tool.totalTokens.toLocaleString()} tokens
                            </span>
                        </li>
                    `).join('');

                // Load timeline
                const timeline = await fetch(`${API_BASE}/api/timeline`).then(r => r.json());
                const timelineEl = document.getElementById('timeline');
                timelineEl.innerHTML = timeline
                    .reverse()
                    .slice(0, 10)
                    .map(item => `
                        <div class="timeline-item">
                            <div class="timeline-time">${new Date(item.timestamp).toLocaleString()}</div>
                            <div class="timeline-tool">${item.tool}</div>
                            <div class="timeline-cost">$${(item.cost || 0).toFixed(4)} · ${item.tokens?.total || 0} tokens</div>
                        </div>
                    `).join('');

            } catch (error) {
                console.error('Error loading data:', error);
                alert('Failed to load data. Make sure API server is running on port 3003.');
            }
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
